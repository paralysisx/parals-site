<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>parals — logged in</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c5cff'/%3E%3Cstop offset='1' stop-color='%2337a5ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='15' fill='url(%23g)'/%3E%3Cpath d='M27 20l-7 24' stroke='%23fff' stroke-width='5.5' stroke-linecap='round'/%3E%3Cpath d='M44 20l-7 24' stroke='%23fff' stroke-width='5.5' stroke-linecap='round' opacity='.72'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #070b18;
      --card: rgba(19, 26, 48, 0.72);
      --border: rgba(110, 130, 190, 0.22);
      --text: #eaeefb;
      --muted: #8d97b5;
      --accent1: #7c5cff;
      --accent2: #37a5ff;
      --ok: #34d399;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
      overflow: hidden;
    }
    .px {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      will-change: transform;
    }
    .grid-layer {
      position: fixed;
      inset: -60px;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(120, 145, 220, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 145, 220, 0.055) 1px, transparent 1px);
      background-size: 54px 54px;
      -webkit-mask-image: radial-gradient(ellipse 75% 65% at 50% 45%, black 25%, transparent 75%);
      mask-image: radial-gradient(ellipse 75% 65% at 50% 45%, black 25%, transparent 75%);
      animation: grid-pan 40s linear infinite;
    }
    @keyframes grid-pan { to { transform: translate(54px, 54px); } }

    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .star {
      position: absolute;
      bottom: -6px;
      border-radius: 50%;
      background: #aef0d8;
      opacity: 0;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      12%  { opacity: var(--o); }
      88%  { opacity: var(--o); }
      100% { transform: translateY(-108vh) translateX(var(--sway)); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .grid-layer, .star, .orb { animation: none; }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 480px; height: 480px; background: #14503d; top: -140px; right: -120px; animation: drift1 20s ease-in-out infinite alternate; }
    .orb-2 { width: 420px; height: 420px; background: #123f70; bottom: -160px; left: -100px; animation: drift2 24s ease-in-out infinite alternate; }
    @keyframes drift1 { to { transform: translate(-110px, 80px) scale(1.12); } }
    @keyframes drift2 { to { transform: translate(90px, -80px) scale(1.08); } }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 25rem;
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.75rem 2.25rem 2.25rem;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
      text-align: center;
      animation: card-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      opacity: 0;
    }
    .card.ready { opacity: 1; }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.6rem;
    }
    .logo { width: 26px; height: 26px; border-radius: 7px; }
    .brand { margin: 0; font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; color: var(--muted); }

    .check-wrap { position: relative; width: 96px; height: 96px; margin: 0 auto 1.4rem; }
    .check-wrap .pulse {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(52, 211, 153, 0.5);
      animation: pulse 2.2s ease-out infinite;
    }
    .check-wrap .pulse:nth-child(2) { animation-delay: 1.1s; }
    @keyframes pulse {
      from { transform: scale(0.9); opacity: 0.8; }
      to   { transform: scale(1.55); opacity: 0; }
    }
    .check-wrap svg { position: relative; width: 96px; height: 96px; }
    .ring { stroke: var(--ok); stroke-width: 2.5; fill: rgba(52, 211, 153, 0.08); stroke-dasharray: 166; stroke-dashoffset: 166; animation: draw 0.7s ease 0.25s forwards; }
    .tick { stroke: var(--ok); stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 48; stroke-dashoffset: 48; animation: draw 0.45s ease 0.8s forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    h1 { margin: 0 0 0.4rem; font-size: 1.75rem; letter-spacing: -0.02em; }
    .who { margin: 0 0 0.3rem; color: var(--muted); }
    .who strong {
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
    }
    .since { margin: 0 0 1.9rem; color: var(--muted); font-size: 0.85rem; }

    .signout {
      width: 100%;
      padding: 0.85rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(9, 13, 28, 0.65);
      color: var(--text);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
    }
    .signout:hover { border-color: #fb7185; background: rgba(251, 113, 133, 0.08); transform: translateY(-1px); }

    .adminlink {
      display: block;
      margin: 0 0 0.9rem;
      padding: 0.85rem;
      border: 1px solid rgba(124, 92, 255, 0.5);
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(124, 92, 255, 0.18), rgba(55, 165, 255, 0.18));
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
      transition: filter 0.2s ease, transform 0.15s ease;
    }
    .adminlink:hover { filter: brightness(1.15); transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="px" data-depth="10"><div class="grid-layer"></div></div>
  <div class="px" data-depth="22">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <div class="px" data-depth="42"><div class="stars" id="stars"></div></div>

  <main class="card" id="card">
    <div class="brand-row">
      <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <linearGradient id="logo-g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#7c5cff"/>
            <stop offset="1" stop-color="#37a5ff"/>
          </linearGradient>
        </defs>
        <rect width="64" height="64" rx="15" fill="url(#logo-g)"/>
        <path d="M27 20l-7 24" stroke="#fff" stroke-width="5.5" stroke-linecap="round"/>
        <path d="M44 20l-7 24" stroke="#fff" stroke-width="5.5" stroke-linecap="round" opacity="0.72"/>
      </svg>
      <p class="brand">parals</p>
    </div>
    <div class="check-wrap">
      <div class="pulse"></div>
      <div class="pulse"></div>
      <svg viewBox="0 0 56 56">
        <circle class="ring" cx="28" cy="28" r="26"/>
        <path class="tick" d="M17 29.5 L24.5 37 L39 20.5"/>
      </svg>
    </div>
    <h1>You are logged in</h1>
    <p class="who">Signed in as <strong id="whoami">…</strong></p>
    <p class="since" id="since"></p>
    <a class="adminlink" id="adminlink" href="/admin" hidden>Admin panel &rarr;</a>
    <button class="signout" id="signout" type="button">Sign out</button>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    // Floating background particles
    (() => {
      const box = $("stars");
      for (let i = 0; i < 70; i++) {
        const s = document.createElement("span");
        const size = 1.5 + Math.random() * 2.2;
        const dur = 14 + Math.random() * 22;
        s.className = "star";
        s.style.left = Math.random() * 100 + "%";
        s.style.width = s.style.height = size + "px";
        s.style.setProperty("--o", (0.12 + Math.random() * 0.35).toFixed(2));
        s.style.setProperty("--sway", (Math.random() * 120 - 60).toFixed(0) + "px");
        s.style.animationDuration = dur + "s";
        s.style.animationDelay = -(Math.random() * dur) + "s";
        box.appendChild(s);
      }
    })();

    // Mouse parallax: each layer drifts opposite the cursor by its depth
    (() => {
      if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const layers = [...document.querySelectorAll(".px")].map((el) => ({
        el, depth: parseFloat(el.dataset.depth) || 0,
      }));
      let tx = 0, ty = 0, cx = 0, cy = 0;
      addEventListener("mousemove", (e) => {
        tx = (e.clientX / innerWidth) * 2 - 1;
        ty = (e.clientY / innerHeight) * 2 - 1;
      });
      (function tick() {
        cx += (tx - cx) * 0.06;
        cy += (ty - cy) * 0.06;
        for (const { el, depth } of layers) {
          el.style.transform = `translate3d(${(-cx * depth).toFixed(1)}px, ${(-cy * depth).toFixed(1)}px, 0)`;
        }
        requestAnimationFrame(tick);
      })();
    })();

    fetch("/api/me").then(async (res) => {
      if (!res.ok) { location.replace("/"); return; }
      const data = await res.json();
      $("whoami").textContent = data.username;
      if (data.role === "admin") $("adminlink").hidden = false;
      if (data.created_at) {
        const d = new Date(data.created_at.replace(" ", "T") + "Z");
        $("since").textContent = "Member since " + d.toLocaleDateString(undefined, { day: "numeric", month: "long", year: "numeric" });
      }
      $("card").classList.add("ready");
    }).catch(() => location.replace("/"));

    $("signout").onclick = async () => {
      await fetch("/api/logout", { method: "POST" });
      location.replace("/");
    };
  </script>
</body>
</html>
