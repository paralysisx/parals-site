<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>parals — hub</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c5cff'/%3E%3Cstop offset='1' stop-color='%2337a5ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='15' fill='url(%23g)'/%3E%3Cpath d='M27 20l-7 24' stroke='%23fff' stroke-width='5.5' stroke-linecap='round'/%3E%3Cpath d='M44 20l-7 24' stroke='%23fff' stroke-width='5.5' stroke-linecap='round' opacity='.72'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #070b18;
      --card: rgba(19, 26, 48, 0.72);
      --border: rgba(110, 130, 190, 0.22);
      --text: #eaeefb;
      --muted: #8d97b5;
      --accent1: #7c5cff;
      --accent2: #37a5ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1.5rem;
    }
    .grid-layer {
      position: fixed;
      inset: -60px;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(120, 145, 220, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 145, 220, 0.05) 1px, transparent 1px);
      background-size: 54px 54px;
      -webkit-mask-image: radial-gradient(ellipse 75% 65% at 50% 40%, black 25%, transparent 75%);
      mask-image: radial-gradient(ellipse 75% 65% at 50% 40%, black 25%, transparent 75%);
      animation: grid-pan 40s linear infinite;
    }
    @keyframes grid-pan { to { transform: translate(54px, 54px); } }
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.45; pointer-events: none; z-index: 0; }
    .orb-1 { width: 460px; height: 460px; background: #3b2d8f; top: -150px; left: -120px; animation: drift1 20s ease-in-out infinite alternate; }
    .orb-2 { width: 420px; height: 420px; background: #123f70; bottom: -160px; right: -110px; animation: drift2 24s ease-in-out infinite alternate; }
    @keyframes drift1 { to { transform: translate(90px, 70px) scale(1.12); } }
    @keyframes drift2 { to { transform: translate(-80px, -70px) scale(1.08); } }
    @media (prefers-reduced-motion: reduce) { .grid-layer, .orb { animation: none; } }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 44rem;
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem 2.25rem 2.25rem;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .card.ready { opacity: 1; transform: none; }

    .topbar { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 1.75rem; }
    .brand-row { display: flex; align-items: center; gap: 0.55rem; }
    .logo { width: 30px; height: 30px; border-radius: 8px; }
    .brand { margin: 0; font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; color: var(--muted); }
    .topbar .spacer { flex: 1; }
    .chip {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.4rem 0.75rem; border: 1px solid var(--border); border-radius: 999px;
      background: rgba(9, 13, 28, 0.55); font-size: 0.85rem; color: var(--muted);
    }
    .chip .dot { width: 7px; height: 7px; border-radius: 50%; background: #34d399; box-shadow: 0 0 8px #34d399; }
    .chip strong { color: var(--text); font-weight: 600; }
    .signout {
      padding: 0.45rem 0.85rem; border: 1px solid var(--border); border-radius: 999px;
      background: rgba(9, 13, 28, 0.55); color: var(--muted); font: inherit; font-size: 0.85rem;
      cursor: pointer; transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }
    .signout:hover { border-color: #fb7185; color: #fecdd3; background: rgba(251, 113, 133, 0.08); }

    h1 { margin: 0 0 0.35rem; font-size: 1.7rem; letter-spacing: -0.02em; }
    h1 span { background: linear-gradient(90deg, var(--accent1), var(--accent2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .lead { margin: 0 0 1.6rem; color: var(--muted); font-size: 0.95rem; }

    .section-label { margin: 0 0 0.85rem; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.9rem; }

    .program {
      display: flex; flex-direction: column; gap: 0.55rem;
      padding: 1.15rem; border: 1px solid var(--border); border-radius: 16px;
      background: rgba(9, 13, 28, 0.5); text-decoration: none; color: var(--text);
      transition: transform 0.18s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .program:hover { transform: translateY(-3px); border-color: rgba(45, 212, 191, 0.5); box-shadow: 0 14px 34px rgba(0, 0, 0, 0.4); }
    .program .picon { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; }
    .program .pname { font-weight: 700; font-size: 1.05rem; }
    .program .pdesc { color: var(--muted); font-size: 0.85rem; line-height: 1.4; }
    .program .pgo { margin-top: auto; color: #2dd4bf; font-size: 0.85rem; font-weight: 600; }

    .program.soon { pointer-events: none; opacity: 0.55; }
    .program.soon .picon { background: rgba(110, 130, 190, 0.15); }
    .program.soon .pgo { color: var(--muted); }

    .adminlink {
      display: inline-block; margin-top: 1.5rem; padding: 0.7rem 1.1rem;
      border: 1px solid rgba(124, 92, 255, 0.5); border-radius: 12px;
      background: linear-gradient(135deg, rgba(124, 92, 255, 0.18), rgba(55, 165, 255, 0.18));
      color: var(--text); font-weight: 700; font-size: 0.9rem; text-decoration: none;
      transition: filter 0.2s ease, transform 0.15s ease;
    }
    .adminlink:hover { filter: brightness(1.15); transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="grid-layer"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <main class="card" id="card">
    <div class="topbar">
      <div class="brand-row">
        <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="logo-g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#7c5cff"/>
              <stop offset="1" stop-color="#37a5ff"/>
            </linearGradient>
          </defs>
          <rect width="64" height="64" rx="15" fill="url(#logo-g)"/>
          <path d="M27 20l-7 24" stroke="#fff" stroke-width="5.5" stroke-linecap="round"/>
          <path d="M44 20l-7 24" stroke="#fff" stroke-width="5.5" stroke-linecap="round" opacity="0.72"/>
        </svg>
        <p class="brand">parals</p>
      </div>
      <span class="spacer"></span>
      <span class="chip"><span class="dot"></span> Signed in as <strong id="whoami">…</strong></span>
      <button class="signout" id="signout" type="button">Sign out</button>
    </div>

    <h1>Welcome back, <span id="hello">there</span></h1>
    <p class="lead">Your hub for parals programs. Pick one to jump in.</p>

    <p class="section-label">Programs</p>
    <div class="grid">
      <a class="program" href="/serenity">
        <span class="picon" style="background:linear-gradient(135deg,#2dd4bf,#14b8a6)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#04201c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3C7 8 7 13 12 21c5-8 5-13 0-18Z"/><path d="M12 21c-4-2-6-5-6-9"/><path d="M12 21c4-2 6-5 6-9"/></svg>
        </span>
        <span class="pname">Serenity</span>
        <span class="pdesc">Calm, focused workspace. Your first sub-program.</span>
        <span class="pgo">Open &rarr;</span>
      </a>

      <div class="program soon">
        <span class="picon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8d97b5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </span>
        <span class="pname">More soon</span>
        <span class="pdesc">Additional programs will appear here.</span>
        <span class="pgo">Coming up</span>
      </div>
    </div>

    <a class="adminlink" id="adminlink" href="/admin" hidden>Admin panel &rarr;</a>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    fetch("/api/me").then(async (res) => {
      if (!res.ok) { location.replace("/"); return; }
      const data = await res.json();
      $("whoami").textContent = data.username;
      $("hello").textContent = data.username;
      if (data.role === "admin") $("adminlink").hidden = false;
      $("card").classList.add("ready");
    }).catch(() => location.replace("/"));

    $("signout").onclick = async () => {
      await fetch("/api/logout", { method: "POST" });
      location.replace("/");
    };
  </script>
</body>
</html>
