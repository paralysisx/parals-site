<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>parals — hub</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c5cff'/%3E%3Cstop offset='1' stop-color='%2337a5ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='15' fill='url(%23g)'/%3E%3Cpath d='M27 20l-7 24' stroke='%23fff' stroke-width='5.5' stroke-linecap='round'/%3E%3Cpath d='M44 20l-7 24' stroke='%23fff' stroke-width='5.5' stroke-linecap='round' opacity='.72'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #070b18;
      --line: rgba(110, 130, 190, 0.16);
      --line-strong: rgba(110, 130, 190, 0.32);
      --text: #eceef4;
      --body: #aab4d0;
      --muted: #8d97b5;
      --accent: #7c5cff;
      --accent-soft: #a99dff;
      --teal: #2dd4bf;
      --teal-soft: #8ff3e4;
      --gold: #c9a84c;
      --gold-soft: #e7d194;
      --live: #34d399;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    /* ambient light, no boxes: each product half casts its own glow */
    .glow { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .glow::before, .glow::after {
      content: ""; position: absolute; width: 60vw; height: 70vh; border-radius: 50%;
      filter: blur(120px); opacity: 0.16;
      transition: opacity 0.6s ease;
    }
    .glow::before { background: var(--teal); left: -12vw; bottom: -22vh; }
    .glow::after  { background: var(--gold); right: -12vw; bottom: -22vh; }
    body.lit-biz .glow::before { opacity: 0.3; }
    body.lit-cap .glow::after  { opacity: 0.3; }

    /* ---- top bar ---- */
    .topbar {
      position: relative; z-index: 2;
      display: flex; align-items: center; gap: 1rem;
      padding: 0.9rem clamp(1rem, 4vw, 2rem);
    }
    .wordmark { display: flex; align-items: center; gap: 0.55rem; }
    .wordmark svg { width: 24px; height: 24px; border-radius: 6px; display: block; }
    .wordmark .name { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .wordmark .name .slash { color: var(--accent-soft); }
    .spacer { flex: 1; }
    .nav { display: flex; align-items: center; gap: 0.8rem; }
    .adminbtn {
      font-size: 0.8rem; font-weight: 600; color: var(--muted); text-decoration: none;
      padding: 0.4rem 0.75rem; border: 1px solid var(--line); border-radius: 9px;
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    .adminbtn:hover { color: var(--text); border-color: var(--line-strong); }
    .user { display: flex; align-items: center; gap: 0.55rem; }
    .avatar {
      width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center;
      background: linear-gradient(150deg, #2a2550, #1b2b4a);
      border: 1px solid var(--line-strong);
      font-size: 0.8rem; font-weight: 700; color: var(--accent-soft); text-transform: uppercase;
    }
    .uname { font-size: 0.86rem; font-weight: 500; }
    @media (max-width: 520px) { .uname { display: none; } }
    .signout {
      font: inherit; font-size: 0.82rem; font-weight: 500; color: var(--muted);
      background: transparent; border: 1px solid var(--line); border-radius: 9px;
      padding: 0.4rem 0.75rem; cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }
    .signout:hover { color: #fecdd3; border-color: #7f2436; background: rgba(190, 60, 82, 0.1); }

    /* ---- greeting ---- */
    .greet {
      position: relative; z-index: 1;
      text-align: center;
      padding: clamp(3rem, 8vh, 6rem) 1.5rem clamp(1.5rem, 4vh, 3rem);
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .ready .greet { opacity: 1; transform: none; }
    .greet h1 {
      margin: 0;
      font-size: clamp(1.9rem, 4.5vw, 3rem);
      font-weight: 700; letter-spacing: -0.03em; line-height: 1.1;
      text-wrap: balance;
    }
    .greet p { margin: 0.6rem 0 0; color: var(--muted); font-size: 0.95rem; }

    /* ---- the stage: two open halves, no boxes ---- */
    .stage {
      position: relative; z-index: 1;
      flex: 1; display: grid; grid-template-columns: 1fr 1fr;
      width: 100%; max-width: 74rem; margin: 0 auto;
      padding: 0 clamp(1rem, 3vw, 2rem) clamp(2rem, 6vh, 4rem);
    }
    /* hairline between the halves — the only line on the stage */
    .stage::before {
      content: ""; position: absolute; top: 8%; bottom: 12%; left: 50%; width: 1px;
      background: linear-gradient(180deg, transparent, var(--line-strong), transparent);
      pointer-events: none;
    }
    .half {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.05rem; text-align: center; text-decoration: none; color: inherit;
      padding: clamp(2rem, 5vh, 3.5rem) clamp(1rem, 4vw, 3.5rem);
      border-radius: 26px;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.6s ease 0.1s, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s;
    }
    .ready .half { opacity: 1; transform: none; }
    .ready .half.cap { transition-delay: 0.2s; }
    .half:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }

    .badge {
      width: clamp(84px, 10vw, 112px); height: clamp(84px, 10vw, 112px);
      border-radius: 24%; display: block;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease;
    }
    .half:hover .badge { transform: translateY(-6px) scale(1.04); }
    .biz:hover .badge { box-shadow: 0 26px 60px rgba(45, 212, 191, 0.28); }
    .cap:hover .badge { box-shadow: 0 26px 60px rgba(201, 168, 76, 0.28); }

    .h-name { margin: 0; font-size: clamp(1.3rem, 2.4vw, 1.7rem); font-weight: 700; letter-spacing: -0.02em; }
    .h-name .fam { color: var(--muted); font-weight: 500; }
    .h-line { margin: 0; color: var(--body); font-size: 0.95rem; line-height: 1.5; max-width: 26ch; text-wrap: balance; }

    .h-open {
      display: inline-flex; align-items: center; gap: 0.45rem;
      font-size: 0.92rem; font-weight: 700; margin-top: 0.3rem;
    }
    .biz .h-open { color: var(--teal-soft); }
    .cap .h-open { color: var(--gold-soft); }
    .h-open .arr { transition: transform 0.2s ease; }
    .half:hover .h-open .arr { transform: translateX(5px); }

    .pill {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.24rem 0.6rem; border-radius: 999px;
    }
    .pill .dot { width: 5px; height: 5px; border-radius: 50%; }
    .pill.live { color: #a7f3d6; background: rgba(52, 211, 153, 0.1); }
    .pill.live .dot { background: var(--live); box-shadow: 0 0 6px var(--live); }
    .pill.early { color: var(--gold-soft); background: rgba(201, 168, 76, 0.1); }
    .pill.early .dot { background: var(--gold); box-shadow: 0 0 6px var(--gold); }

    /* ---- footer ---- */
    .footer {
      position: relative; z-index: 1;
      padding: 1rem clamp(1rem, 4vw, 2rem) 1.4rem;
      display: flex; justify-content: center;
      font-size: 0.75rem; color: rgba(141, 151, 181, 0.6);
    }
    .footer .slash { color: var(--accent-soft); }

    @media (max-width: 680px) {
      .stage { grid-template-columns: 1fr; max-width: 30rem; }
      .stage::before { top: 50%; bottom: auto; left: 12%; right: 12%; width: auto; height: 1px;
        background: linear-gradient(90deg, transparent, var(--line-strong), transparent); }
      .half { padding: clamp(2rem, 6vh, 3rem) 1rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .greet, .half, .badge, .h-open .arr { transition: none; opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>

  <header class="topbar">
    <div class="wordmark">
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <defs><linearGradient id="logo-g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#37a5ff"/></linearGradient></defs>
        <rect width="64" height="64" rx="15" fill="url(#logo-g)"/>
        <path d="M27 20l-7 24" stroke="#fff" stroke-width="5.5" stroke-linecap="round"/>
        <path d="M44 20l-7 24" stroke="#fff" stroke-width="5.5" stroke-linecap="round" opacity="0.72"/>
      </svg>
      <span class="name">parals<span class="slash">//</span></span>
    </div>
    <span class="spacer"></span>
    <nav class="nav">
      <a class="adminbtn" id="adminlink" href="/admin" hidden>Admin</a>
      <div class="user">
        <span class="avatar" id="avatar">·</span>
        <span class="uname" id="whoami">…</span>
      </div>
      <button class="signout" id="signout" type="button">Sign out</button>
    </nav>
  </header>

  <main id="stage-root" style="display: contents">
    <section class="greet">
      <h1>Welcome back, <span id="hello">there</span>.</h1>
      <p>Pick a program.</p>
    </section>

    <div class="stage">
      <a class="half biz" href="https://bithm-production.up.railway.app/workspaces" target="_blank" rel="noopener"
         onmouseenter="document.body.classList.add('lit-biz')" onmouseleave="document.body.classList.remove('lit-biz')">
        <img class="badge" src="/img/serenity-business.png" alt="">
        <span class="pill live"><span class="dot"></span> Live</span>
        <h2 class="h-name"><span class="fam">Serenity</span> Business</h2>
        <p class="h-line">The full back office.</p>
        <span class="h-open">Open <span class="arr">→</span></span>
      </a>

      <a class="half cap" href="https://capture.parals.net" target="_blank" rel="noopener"
         onmouseenter="document.body.classList.add('lit-cap')" onmouseleave="document.body.classList.remove('lit-cap')">
        <img class="badge" src="/img/serenity-capture.png" alt="">
        <span class="pill early"><span class="dot"></span> Early</span>
        <h2 class="h-name"><span class="fam">Serenity</span> Capture</h2>
        <p class="h-line">Money in, money out.</p>
        <span class="h-open">Open <span class="arr">→</span></span>
      </a>
    </div>
  </main>

  <footer class="footer">
    <span>parals<span class="slash">//</span>&nbsp;— the Serenity family</span>
  </footer>

  <script>
    const $ = (id) => document.getElementById(id);

    fetch("/api/me").then(async (res) => {
      if (!res.ok) { location.replace("/"); return; }
      const data = await res.json();
      const name = data.username || "";
      $("whoami").textContent = name;
      $("hello").textContent = name || "there";
      $("avatar").textContent = (name[0] || "·");
      if (data.role === "admin") $("adminlink").hidden = false;
      document.body.classList.add("ready");
    }).catch(() => location.replace("/"));

    $("signout").onclick = async () => {
      await fetch("/api/logout", { method: "POST" });
      location.replace("/");
    };
  </script>
</body>
</html>
